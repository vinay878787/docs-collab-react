name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /www/wwwroot/docs-collab
            git pull origin main
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
            echo "✅ docs-collab deployed successfully"
